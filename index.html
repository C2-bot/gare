<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C2 Group — Analizzatore Disciplinari di Gara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --blue:    #003E87;
    --blue-mid:#0074C5;
    --accent:  #F55D3E;
    --white:   #FFFFFF;
    --off:     #F9FAFB;
    --gray:    #5F6368;
    --border:  #DADCE0;
    --text:    #000000;
    --ok:      #31C192;
    --err:     #C62828;
    --light-blue: #DFF1FF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--blue);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    display: flex;
    align-items: center;
  }
  .header-logo img {
    height: 32px;
    width: auto;
  }
  .header-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 17px;
    color: var(--white);
    letter-spacing: .02em;
  }
  .header-title span {
    color: var(--accent);
    font-weight: 600;
  }
  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,.75);
    font-size: 13px;
  }
  .btn-logout {
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: Arial, sans-serif;
  }
  .btn-logout:hover { background: var(--blue-mid); color: var(--white); }

  /* ── LAYOUT ─────────────────────────────────── */
  .app { flex: 1; display: flex; }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    width: 280px;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gray);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-empty {
    padding: 16px 20px;
    font-size: 13px;
    color: var(--gray);
    font-style: italic;
  }
  .history-list { overflow-y: auto; flex: 1; }
  .history-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .history-item:hover { background: var(--off); }
  .history-item.active { border-left-color: var(--blue-mid); background: var(--light-blue); }
  .history-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }
  .btn-nuova {
    margin: 16px 20px 0;
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-nuova:hover { background: var(--blue-mid); color: var(--white); }

  /* ── MAIN AREA ─────────────────────────────── */
  main { flex: 1; overflow-y: auto; padding: 40px; }

  /* ── SCREEN: LOGIN ─────────────────────────── */
  #screen-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #003E87 0%, #001A3D 100%);
  }
  .login-card {
    background: var(--white);
    border-radius: 16px;
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,.3);
  }
  .login-logo {
    margin-bottom: 20px;
  }
  .login-logo img {
    width: 80px;
    height: auto;
  }
  .login-heading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 32px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--blue-mid); }
  .field-hint {
    font-size: 11px;
    color: var(--gray);
    margin-top: 4px;
  }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: background .2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #7E0000; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .login-error {
    background: #FFEBEE;
    color: var(--err);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ── SCREEN: UPLOAD ─────────────────────────── */
  .upload-wrapper {
    max-width: 680px;
    margin: 0 auto;
  }
  .page-heading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 36px;
  }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 64px 40px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--white);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--blue-mid);
    background: var(--light-blue);
  }
  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .drop-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .drop-sub { font-size: 13px; color: var(--gray); }
  .drop-sub span { color: var(--blue-mid); text-decoration: underline; cursor: pointer; }
  #file-input { display: none; }
  .files-list { display: none; margin-top: 20px; }
  .files-list.visible { display: block; }
  .files-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--blue-mid);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .file-selected {
    display: none;
    margin-top: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    align-items: center;
    gap: 14px;
  }
  .file-selected.visible { display: flex; }
  .file-icon {
    width: 40px;
    height: 40px;
    background: #FFEBEE;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .file-info { flex: 1; }
  .file-name { font-size: 14px; font-weight: 500; }
  .file-size { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .btn-remove {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }
  .btn-analyze {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all .2s;
    display: none;
  }
  .btn-analyze:hover { background: #7E0000; }
  .btn-analyze.visible { display: block; }

  /* ── SCREEN: PROCESSING ─────────────────────── */
  .processing-card {
    max-width: 520px;
    margin: 60px auto;
    background: var(--white);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid var(--border);
    border-top-color: var(--blue-mid);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .processing-sub { font-size: 14px; color: var(--gray); line-height: 1.6; }
  .progress-steps { margin-top: 28px; text-align: left; }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
    color: var(--gray);
    border-bottom: 1px solid var(--border);
  }
  .step:last-child { border-bottom: none; }
  .step-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .step.done .step-dot { background: var(--ok); border-color: var(--ok); color: white; }
  .step.active .step-dot { border-color: var(--blue-mid); animation: pulse 1s infinite; }
  .step.done, .step.active { color: var(--text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── SCREEN: RESULTS ─────────────────────────── */
  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
  }
  .results-meta { font-size: 12px; color: var(--gray); margin-top: 4px; }
  .results-meta span { color: var(--ok); font-weight: 600; }
  .btn-download {
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-download:hover { background: var(--blue-mid); color: var(--white); }

  .btn-approfondimento {
    color: var(--white);
    background: var(--accent);
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-approfondimento:hover { background: #D94A2E; }

  .approfondimento-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .approfondimento-title {
    font-size: 16px;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    color: var(--blue-dark);
  }
  .approfondimento-meta {
    font-size: 12px;
    color: var(--gray);
    margin-top: 4px;
  }
  .approfondimento-body {
    padding: 20px 24px;
    font-size: 14px;
    line-height: 1.7;
    color: #333;
  }
  .approfondimento-body h3.appr-h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--blue-dark);
    margin: 20px 0 8px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent);
  }
  .approfondimento-body h4.appr-h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--blue-mid);
    margin: 14px 0 6px 0;
  }
  .approfondimento-body ul {
    margin: 6px 0;
    padding-left: 20px;
  }
  .approfondimento-body li {
    margin-bottom: 4px;
  }
  .approfondimento-body strong {
    color: var(--blue-dark);
  }
  #approfondimento-result {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .section-card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .section-header {
    font-family: 'Montserrat', sans-serif;
    background: var(--blue-mid);
    color: white;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .section-fields { padding: 0; }
  .field-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    background: var(--light-blue);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 14px;
  }
  .field-value {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    display: flex;
    align-items: center;
  }
  .field-value.missing {
    color: var(--gray);
    font-style: italic;
    font-size: 12px;
  }

  /* ── SIDEBAR TABS ─────────────────────────── */
  .sidebar-tabs {
    display: flex;
    padding: 0 12px 12px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--gray);
    cursor: pointer;
    border-radius: 6px;
    transition: all .15s;
  }
  .sidebar-tab:hover { background: var(--off); }
  .sidebar-tab.active {
    background: var(--light-blue);
    color: var(--blue-mid);
  }
  .archive-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .archive-item:hover { background: var(--off); }
  .archive-item.active { border-left-color: var(--blue-mid); background: var(--light-blue); }
  .archive-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .archive-item-meta {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }
  .archive-item-importo {
    font-size: 11px;
    color: var(--blue-mid);
    font-weight: 500;
    margin-top: 1px;
  }
  .sidebar-loading {
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--gray);
  }

  /* ── ARCHIVE SEARCH ────────────────────────── */
  .archive-search-wrap {
    padding: 0 16px 12px;
  }
  .archive-search {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: Arial, sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .archive-search:focus { border-color: var(--blue-mid); }
  .archive-search::placeholder { color: var(--gray); }

  /* ── FILTER PANEL ─────────────────────────── */
  .filter-panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .filter-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 170px;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--gray);
  }
  .filter-select, .filter-input {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
  }
  .filter-select:focus, .filter-input:focus { border-color: var(--blue-mid); }
  .btn-reset-filters {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--white);
    color: var(--gray);
    font-size: 12px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: all .15s;
  }
  .btn-reset-filters:hover { background: var(--off); color: var(--text); }

  /* ── ARCHIVE GRID ─────────────────────────── */
  .filter-count {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 16px;
  }
  .archive-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .gara-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all .15s;
  }
  .gara-card:hover {
    border-color: var(--blue-mid);
    box-shadow: 0 4px 12px rgba(0,116,197,.12);
  }
  .gara-card-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--blue);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .gara-card-field {
    font-size: 12px;
    color: var(--gray);
    margin-top: 4px;
  }
  .gara-card-field strong {
    color: var(--text);
    font-weight: 500;
  }
  .gara-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .gara-card-badge {
    display: inline-block;
    background: var(--light-blue);
    color: var(--blue-mid);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .gara-card-valore {
    display: inline-block;
    background: #E8F5E9;
    color: #2E7D32;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .gara-card-area {
    display: inline-block;
    background: #FFF3E0;
    color: #E65100;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .gara-card-localita {
    display: inline-block;
    background: #F3E5F5;
    color: #7B1FA2;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .filter-row + .filter-row {
    margin-top: 10px;
  }

  /* ── SCORE FATTIBILITA ──────────────────────────── */
  .score-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: white;
    flex-shrink: 0;
  }
  .score-badge-sm {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    font-size: 13px;
  }
  .score-label {
    font-size: 11px;

function formatSize(bytes) {

// ═══════════════════════════════════════════════════
//  ESTRAZIONE TESTO DA PDF (client-side con pdf.js)
// ═══════════════════════════════════════════════════
async function estraiTestoPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let testo = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(" ");
    testo += pageText + "\n";
  }
  return { text: testo, numPages: pdf.numPages };
}

// ═══════════════════════════════════════════════════
//  CHIAMATA API CLAUDE (diretta dal browser)
// ═══════════════════════════════════════════════════
async function chiamaApi(testo, blocco, totale) {
  const contesto = totale > 1
    ? `[Blocco ${blocco}/${totale} del documento. Estrai solo le info presenti in questo blocco.]\n\n`
    : "";

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": state.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      messages: [{ role: "user", content: "Analizza i seguenti documenti di gara (possono includere Disciplinare, Capitolato Tecnico, Allegati). Estrai le informazioni richieste integrando i dati da tutti i documenti forniti:\n\n" + contesto + testo }],
    }),
  });

  if (!response.ok) {
    const errBody = await response.text();
    throw new Error("Errore API Claude (" + response.status + "): " + errBody);
  }

  const result = await response.json();
  let raw = result.content[0].text.trim();
  raw = raw.replace(/```json/g, "").replace(/```/g, "").trim();
  return JSON.parse(raw);
}

function unisciRisultati(lista) {
  const campi = SEZIONI.flatMap(s => s.campi.map(c => c[0]));
  const risultato = {};
  for (const key of campi) {
    for (const dati of lista) {
      const val = dati[key];
      if (val && val !== NOT_FOUND) { risultato[key] = val; break; }
    }
    if (!risultato[key]) risultato[key] = NOT_FOUND;
  }
  return risultato;
}

async function caricaIndiceProdotti() {
  if (indiceProdottiCache && (Date.now() - indiceProdottiTs) < INDICE_TTL) return indiceProdottiCache;
  const resp = await fetch("data/indice_prodotti.json", { cache: "no-cache" });
  if (!resp.ok) throw new Error("Impossibile caricare l'indice prodotti");
  indiceProdottiCache = await resp.json();
  indiceProdottiTs = Date.now();
  return indiceProdottiCache;
}

function filtraProdottiPerGara(indice, dati) {
  const sottoCategorie = (dati.sotto_categorie_merceologiche || "")
    .split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
  if (!sottoCategorie.length) return { filtrati: [], perCategoria: {} };

  const perCategoria = {};
  for (const p of indice.prodotti) {
    const sc = (p.sc || "").toLowerCase();
    if (sottoCategorie.some(s => sc.includes(s) || s.includes(sc))) {
      const catKey = p.sc || "Altro";
      if (!perCategoria[catKey]) perCategoria[catKey] = [];
      perCategoria[catKey].push(p);
    }
  }

  // Max N prodotti per categoria (ordinati per prezzo crescente per varietà)
  const filtrati = [];
  for (const [cat, prods] of Object.entries(perCategoria)) {
    prods.sort((a, b) => a.p - b.p);
    const selezionati = prods.slice(0, MAX_PRODOTTI_PER_CATEGORIA);
    perCategoria[cat] = selezionati;
    filtrati.push(...selezionati);
  }
  return { filtrati, perCategoria };
}

function costruisciTestoProdotti(perCategoria, baseUrl) {
  let testo = "";
  for (const [cat, prods] of Object.entries(perCategoria)) {
    testo += `\n## ${cat} (${prods.length} prodotti)\n`;
    for (const p of prods) {
      testo += `- ${p.t} | ${p.b} | ${p.p} EUR | ${baseUrl}${p.l}\n`;
    }
  }
  return testo;
}

function costruisciRiepilogoGara(dati) {
  const campiRilevanti = [
    "oggetto_gara", "valore_appalto", "numero_lotti", "importo_per_lotto",
    "criterio_aggiudicazione", "categorie_prodotti", "marche_specifiche",
    "certificazioni", "installazione_beni", "sotto_categorie_merceologiche",
    "aree_tematiche"
  ];
  let riepilogo = "";
  for (const key of campiRilevanti) {
    const val = dati[key];
    if (val && val !== NOT_FOUND) {
      riepilogo += `${key}: ${val}\n`;
    }
  }
  return riepilogo;
}

async function avviaApprofondimento(garaIdx) {
  const gara = archivioData.gare[garaIdx];
  const dati = archivioCache[gara.id];

  const container = document.getElementById("approfondimento-result");
  if (!container) { alert("Errore: container approfondimento non trovato"); return; }

  if (!dati) {
    container.style.display = "block";
    container.innerHTML = `<div class="alert-error">Dati della gara non disponibili. Ricarica la pagina e riprova.</div>`;
    container.scrollIntoView({ behavior: "smooth", block: "start" });
    return;
  }

  container.innerHTML = `
    <div class="processing-card" style="margin-top:0;">
      <div class="spinner"></div>
      <div class="processing-title">Analisi prodotti in corso...</div>
      <div class="processing-sub">Caricamento catalogo e invio a Claude AI. Attendere 20-50 secondi.</div>
    </div>`;
  container.style.display = "block";
  container.scrollIntoView({ behavior: "smooth", block: "start" });

  try {
    // 1. Carica indice prodotti
    const indice = await caricaIndiceProdotti();

    // 2. Filtra per sotto-categorie della gara
    const { filtrati, perCategoria } = filtraProdottiPerGara(indice, dati);

    if (!filtrati.length) {
      container.innerHTML = `<div class="alert-error">Nessun prodotto trovato nel catalogo C2 per le sotto-categorie di questa gara.
        <br>Sotto-categorie gara: ${escHtml(dati.sotto_categorie_merceologiche || "nessuna")}</div>`;
      return;
    }

    // 3. Costruisci prompt
    const testoProdotti = costruisciTestoProdotti(perCategoria, indice.base_url);
    const riepilogoGara = costruisciRiepilogoGara(dati);
    const numProdotti = filtrati.length;
    const numCategorie = Object.keys(perCategoria).length;

    const userMessage = `DATI DELLA GARA:\n${riepilogoGara}\n\nPRODOTTI CATALOGO C2 (${numProdotti} prodotti in ${numCategorie} sotto-categorie):\n${testoProdotti}`;

    // 4. Chiama Claude
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 4096,
        system: PROMPT_APPROFONDIMENTO,
        messages: [{ role: "user", content: userMessage }],
      }),
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error("Errore API Claude (" + response.status + "): " + errBody);
    }

    const result = await response.json();
    const risposta = result.content[0].text.trim();

    // 5. Renderizza risultato (markdown semplice → HTML)
    const htmlRisposta = markdownSemplice(risposta);

    container.innerHTML = `
      <div class="approfondimento-header">
        <div class="approfondimento-title">Analisi Prodotti Dettagliata</div>
        <div class="approfondimento-meta">${numProdotti} prodotti analizzati in ${numCategorie} sotto-categorie</div>
      </div>
      <div class="approfondimento-body">${htmlRisposta}</div>`;

  } catch (e) {
    container.innerHTML = `<div class="alert-error">Errore durante l'approfondimento: ${escHtml(e.message)}</div>`;
  }
}

function markdownSemplice(md) {
  return md
    .replace(/^### (.+)$/gm, '<h4 class="appr-h4">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 class="appr-h3">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n- /g, '\n<li>')
    .replace(/(<li>.*?)(?=\n<li>|\n<h|$)/gs, '$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════════
//  ANALISI
// ═══════════════════════════════════════════════════
async function avviaAnalisi() {
  if (!fileScelti.length) return;
  const nomiFile = fileScelti.map(f => f.name);
  const etichetta = nomiFile.length === 1 ? nomiFile[0] : `${nomiFile.length} documenti`;

  mostraProcessing(etichetta);

  try {
    // 1. Estrai testo da tutti i PDF
    let testoCompleto = "";
    let pagineTotali = 0;
    for (let i = 0; i < fileScelti.length; i++) {
      const pdfData = await estraiTestoPdf(fileScelti[i]);
      if (fileScelti.length > 1) {
        testoCompleto += `\n\n═══════════════════════════════════════\n  DOCUMENTO ${i + 1}/${fileScelti.length}: ${fileScelti[i].name}\n═══════════════════════════════════════\n\n`;
      }
      testoCompleto += pdfData.text;
      pagineTotali += pdfData.numPages;
    }

    if (!testoCompleto || testoCompleto.trim().length < 200) {
      throw new Error("PDF non leggibili o testo troppo breve. Verificare che non siano documenti scansionati.");
    }

    setStep(1);

    // 2. Suddividi in blocchi se necessario
    let blocchi = [];
    if (testoCompleto.length <= CHUNK_SIZE) {
      blocchi = [testoCompleto];
    } else {
      let inizio = 0;
      while (inizio < testoCompleto.length) {
        let fine = inizio + CHUNK_SIZE;
        if (fine < testoCompleto.length) {
          const finePara = testoCompleto.lastIndexOf("\n", fine);
          if (finePara > inizio + CHUNK_SIZE / 2) fine = finePara;
        }
        blocchi.push(testoCompleto.slice(inizio, fine));
        inizio = fine;
      }
    }

    // 3. Analizza ogni blocco
    const risultati = [];
    for (let i = 0; i < blocchi.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 45000));
      const dati = await chiamaApi(blocchi[i], i + 1, blocchi.length);
      risultati.push(dati);
    }

    const datiFinal = blocchi.length > 1 ? unisciRisultati(risultati) : risultati[0];

    setStep(2);
    setStep(3);

    // 4. Salva in storico
    const voce = {
      nomeFile: nomiFile.length === 1 ? nomiFile[0] : nomiFile.join(" + "),
      nomiFile,
      dati: datiFinal,
      pagine: pagineTotali,
      numDocumenti: fileScelti.length,
      blocchi: blocchi.length,
      ts: new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }),
      compilati: Object.values(datiFinal).filter(v => v !== NOT_FOUND).length,
    };
    state.storico.unshift(voce);
    state.corrente = 0;
    aggiornaHistoryUI();

    setTimeout(() => mostraRisultati(0), 600);

  } catch (e) {
    document.getElementById("main-area").innerHTML = `
      <div class="upload-wrapper">
        <div class="alert-error">Errore durante l'analisi: ${escHtml(e.message)}</div>
        <button class="btn-primary" onclick="mostraUpload()" style="max-width:200px; margin-top:16px;">Riprova</button>
      </div>`;
  }
}

function setStep(idx) {

    const el = document.getElementById("step-" + i);
    if (el) { el.className = "step done"; el.querySelector(".step-dot").textContent = "\u2713"; }
  }
  const curr = document.getElementById("step-" + idx);
  if (curr) curr.className = "step active";
  stepCorrente = idx;
}

function mostraRisultati(idx) {
  state.corrente = idx;
  aggiornaHistoryUI();
  const voce = state.storico[idx];
  const { dati, nomeFile, pagine, compilati, blocchi, ts, numDocumenti } = voce;

  const sezioniHtml = SEZIONI.map(sez => `
    <div class="section-card">
      <div class="section-header">${sez.titolo}</div>
      <div class="section-fields">
        ${sez.campi.map(([key, label]) => {
          const val = dati[key] || NOT_FOUND;
          const missing = val === NOT_FOUND;
          return `<div class="field-row">
            <div class="field-label">${label}</div>
            <div class="field-value ${missing ? 'missing' : ''}">${missing ? '\u2014' : escHtml(val)}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`).join("");

  const docLabel = numDocumenti > 1 ? `${numDocumenti} documenti` : "documento singolo";

  document.getElementById("main-area").innerHTML = `
    <div class="results-header">
      <div>
        <div class="page-heading">${escHtml(nomeFile.replace(".pdf",""))}</div>
        <div class="results-meta">
          ${pagine} pag. &nbsp;·&nbsp;
          <span>${compilati}/23 campi compilati</span> &nbsp;·&nbsp;
          ${docLabel}${blocchi > 1 ? ` (${blocchi} blocchi)` : ""} &nbsp;·&nbsp;
          ore ${ts}
        </div>
      </div>
      <button class="btn-download" onclick="scaricaPdf(${idx})">Scarica PDF Scheda</button>
    </div>
    ${sezioniHtml}`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

function aggiornaHistoryUI() {

//  SCARICA PDF (jsPDF client-side)
// ═══════════════════════════════════════════════════
function scaricaPdf(idx) {
  const { jsPDF } = window.jspdf;
  const voce  = state.storico[idx];

  SEZIONI.forEach(sez => {

    doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
    doc.rect(ML, y, TW, 7, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text(sez.titolo.toUpperCase(), ML + 3, y + 5);
    y += 9;

    sez.campi.forEach(([key, label]) => {
      const val     = dati[key] || NOT_FOUND;
      const missing = val === NOT_FOUND;
      const lines   = doc.splitTextToSize(missing ? "\u2014" : val, TW - 68);
      const rowH    = Math.max(8, lines.length * 4.5 + 4);

      if (y + rowH > 282) { doc.addPage(); y = 20; }

      doc.setFillColor(247, 250, 253);
      doc.rect(ML, y, 62, rowH, "F");
      doc.setDrawColor(221, 227, 236);
      doc.rect(ML, y, TW, rowH);

      doc.setFont("helvetica", "bold");
      doc.setFontSize(7.5);
      doc.setTextColor(BLUE[0], BLUE[1], BLUE[2]);
      doc.text(label, ML + 2, y + 5);

      doc.setFont("helvetica", missing ? "italic" : "normal");
      doc.setFontSize(8);
      if (missing) {
        doc.setTextColor(GRAY[0], GRAY[1], GRAY[2]);
      } else {
        doc.setTextColor(28, 43, 58);
      }
      doc.text(lines, ML + 64, y + 5);
      y += rowH;
    });
    y += 4;
  });

  // Footer
  doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
  doc.rect(0, 287, W, 10, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(7);
  doc.text("C2 Group - Documento riservato ad uso interno", W / 2, 293, { align: "center" });

  doc.save(nomeFile.replace(".pdf", "_ANALISI.pdf"));
}

async function caricaScoreConfig() {
  if (scoreConfig) return scoreConfig;
  try {
    const resp = await fetch("data/score_config.json");
    if (resp.ok) scoreConfig = await resp.json();
  } catch (e) { /* fallback */ }
  if (!scoreConfig) scoreConfig = SCORE_CONFIG_DEFAULT;
  return scoreConfig;
}

function getConf() { return scoreConfig || SCORE_CONFIG_DEFAULT; }

/* ── Calcolo criticità operative (0-100, alto = poche criticità) ── */
function calcolaCriticita(dati) {
  const NF = NOT_FOUND;
  const conf = getConf().fattori_criticita;
  const fattori = {};

  // 1. Criterio aggiudicazione (OEPV = buono, minor prezzo = male)
  const crit = (dati.criterio_aggiudicazione || NF).toLowerCase();
  if (crit === NF.toLowerCase()) fattori.criterio_aggiudicazione = 50;
  else if (crit.includes("oepv") || crit.includes("offerta economicamente")) fattori.criterio_aggiudicazione = 90;
  else if (crit.includes("minor prezzo") || crit.includes("prezzo più basso")) fattori.criterio_aggiudicazione = 25;
  else fattori.criterio_aggiudicazione = 60;

  // 2. Penali
  const pen = (dati.penali || NF).toLowerCase();
  if (pen === NF.toLowerCase() || pen.includes("non previste") || pen.includes("non specificat")) fattori.penali = 80;
  else if (pen.includes("tetto") || pen.includes("massimo") || pen.includes("max")) fattori.penali = 60;
  else if (pen.includes("1%") || pen.includes("0,")) fattori.penali = 70;
  else fattori.penali = 35;

  // 3. Tempi consegna
  const tempi = dati.data_limite_consegna_beni || NF;
  const ggMatch = tempi.match(/(\d+)\s*giorn/i);
  if (ggMatch) {
    const gg = parseInt(ggMatch[1]);
    if (gg >= 60) fattori.tempi_consegna = 90;
    else if (gg >= 30) fattori.tempi_consegna = 60;
    else fattori.tempi_consegna = 25;
  } else fattori.tempi_consegna = 60; // non specificato = neutro

  // 4. Requisiti tecnici
  const req = (dati.requisiti_capacita_tecnica_professionale || NF).toLowerCase();
  if (req === NF.toLowerCase()) fattori.requisiti_tecnici = 70;
  else if (req.includes("fatturato") && (req.includes("milion") || req.match(/\d{3}\.?\d{3}/))) fattori.requisiti_tecnici = 25;
  else if (req.includes("certificazion") || req.includes("iso")) fattori.requisiti_tecnici = 45;
  else fattori.requisiti_tecnici = 70;

  // 5. Complessità consegna
  const luogo = (dati.luogo_consegna || NF).toLowerCase();
  if (luogo.includes("plesso unico") || luogo.includes("unico")) fattori.complessita_consegna = 90;
  else if (luogo.includes("più plessi") || luogo.includes("piu plessi")) fattori.complessita_consegna = 35;
  else fattori.complessita_consegna = 65;

  // 6. Costi partecipazione (cauzione + ANAC + bollo)
  const cauzione = (dati.garanzia_cauzione_provvisoria || "").toLowerCase();
  const anac = (dati.contributo_anac || "").toLowerCase();
  const bollo = (dati.imposta_bollo_partecipazione || "").toLowerCase();
  let costiCount = 0;
  if (cauzione.startsWith("s")) costiCount++;
  if (anac.startsWith("s")) costiCount++;
  if (bollo.startsWith("s")) costiCount++;
  fattori.costi_partecipazione = costiCount === 0 ? 90 : costiCount === 1 ? 70 : costiCount === 2 ? 50 : 30;

  // 7. Garanzia obbligatoria
  const gar = (dati.garanzia_minima_obbligatoria || NF).toLowerCase();
  if (gar === NF.toLowerCase() || gar.includes("non")) fattori.garanzia_obbligatoria = 85;
  else if (gar.includes("24") || gar.includes("12")) fattori.garanzia_obbligatoria = 70;
  else if (gar.includes("36")) fattori.garanzia_obbligatoria = 50;
  else if (gar.includes("48") || gar.includes("60")) fattori.garanzia_obbligatoria = 25;
  else fattori.garanzia_obbligatoria = 55;

  // 8. Subappalto
  const sub = (dati.subappalto || dati.altri_servizi_richiesti || NF).toLowerCase();
  if (sub.includes("non ammesso") || sub.includes("non consentito") || sub.includes("vietato")) fattori.subappalto = 30;
  else fattori.subappalto = 80;

  // Media pesata
  let somma = 0, pesoTot = 0;
  for (const [k, v] of Object.entries(fattori)) {
    const p = conf[k]?.peso || 10;
    somma += v * p;
    pesoTot += p;
  }
  const score = pesoTot > 0 ? Math.round(somma / pesoTot) : 50;
  return { score, fattori };
}

/* ── Calcolo copertura prodotti (0-100) ── */
function calcolaCopertura(dati) {
  const conf = getConf();
  const confCop = conf.fattori_copertura;
  const catalogo = conf.prodotti_per_sotto_categoria || {};
  const catalogoKeys = Object.keys(catalogo);
  const fattori = {};

  // Sotto-categorie della gara
  const scRaw = dati.sotto_categorie_merceologiche || "";
  const garaSottoCat = scRaw && scRaw !== NOT_FOUND
    ? scRaw.split(",").map(s => s.trim()).filter(Boolean)
    : [];

  if (garaSottoCat.length === 0) {
    // Fallback su aree tematiche
    return { score: 50, fattori: {
      copertura_sotto_categorie: 50,
      marchi_in_catalogo: 50,
      profondita_catalogo: 50,
      compatibilita_importo: 50,
    }, note: "Sotto-categorie non disponibili — score stimato" };
  }

  // 1. Copertura sotto-categorie: quante delle richieste sono nel catalogo?
  const coperte = garaSottoCat.filter(sc => catalogoKeys.some(k => k.toLowerCase() === sc.toLowerCase()));
  fattori.copertura_sotto_categorie = garaSottoCat.length > 0
    ? Math.round((coperte.length / garaSottoCat.length) * 100)
    : 50;

  // 2. Marchi in catalogo (se il bando cita marchi e noi li abbiamo)
  const marche = dati.marche_specifiche || dati.categorie_prodotti || NOT_FOUND;
  if (marche === NOT_FOUND || !marche) {
    fattori.marchi_in_catalogo = 70; // nessun vincolo = positivo
  } else {
    // Euristico: se ci sono marchi comuni nel nostro catalogo
    const marcheLower = marche.toLowerCase();
    const brandsNoti = ["hp","lenovo","apple","samsung","epson","canon","brother","acer","asus","dell",
                        "logitech","philips","viewsonic","jabra","lg","arredalab","c2 group"];
    const trovati = brandsNoti.filter(b => marcheLower.includes(b));
    const totMenzionati = marche.split(/[,;\/]/).filter(s => s.trim().length > 2).length || 1;
    fattori.marchi_in_catalogo = Math.min(100, Math.round((trovati.length / totMenzionati) * 100));
  }

  // 3. Profondità catalogo: media prodotti per sotto-categoria coperta
  if (coperte.length > 0) {
    const mediaProdotti = coperte.reduce((sum, sc) => {
      const key = catalogoKeys.find(k => k.toLowerCase() === sc.toLowerCase());
      return sum + (key ? catalogo[key] : 0);
    }, 0) / coperte.length;
    // >200 prodotti medi = ottimo, <20 = scarso
    fattori.profondita_catalogo = Math.min(100, Math.round(mediaProdotti / 2));
  } else {
    fattori.profondita_catalogo = 10;
  }

  // 4. Compatibilità importo (euristico su range prezzi)
  fattori.compatibilita_importo = 70; // default neutro-positivo

  // Media pesata
  let somma = 0, pesoTot = 0;
  for (const [k, v] of Object.entries(fattori)) {
    const p = confCop[k]?.peso || 10;
    somma += v * p;
    pesoTot += p;
  }
  const score = pesoTot > 0 ? Math.round(somma / pesoTot) : 50;
  return { score, fattori };
}

/* ── Score finale A-E ── */
function calcolaScore(dati) {
  const conf = getConf();
  const crit = calcolaCriticita(dati);
  const cop = calcolaCopertura(dati);
  const finale = Math.round(
    (crit.score * conf.peso_criticita + cop.score * conf.peso_copertura) /
    (conf.peso_criticita + conf.peso_copertura)
  );

  const fasce = conf.fasce_score;
  let lettera = "C";
  let fascia = fasce.C;
  for (const [l, f] of Object.entries(fasce)) {
    if (finale >= f.min && finale <= f.max) {
      lettera = l;
      fascia = f;
      break;
    }
  }

  return { lettera, finale, fascia, criticita: crit, copertura: cop };
}

    complessita_consegna: "Complessità consegna (plessi)",
    costi_partecipazione: "Costi di partecipazione",
    garanzia_obbligatoria: "Garanzia obbligatoria",

    copertura_sotto_categorie: "Copertura sotto-categorie",
    marchi_in_catalogo: "Marchi richiesti in catalogo",
    profondita_catalogo: "Profondità gamma prodotti",
    compatibilita_importo: "Compatibilità importo",
  };

  function dotColor(val) {
    if (val >= 70) return "#2E7D32";
    if (val >= 45) return "#F57F17";
    return "#C62828";
  }

  function renderFattori(fattori, labels) {
    return Object.entries(fattori).map(([k, v]) => `
      <div class="score-factor">
        <div class="score-factor-dot" style="background:${dotColor(v)}"></div>
        <div class="score-factor-name">${labels[k] || k}</div>
        <div class="score-factor-val" style="color:${dotColor(v)}">${v}/100</div>
      </div>`).join("");
  }

  const noteHtml = sc.copertura.note
    ? `<div style="font-size:11px; color:var(--gray); font-style:italic; margin-top:8px;">${sc.copertura.note}</div>`
    : "";

  return `
    <div class="score-section">
      <div class="score-header">
        <div class="score-header-letter" style="background:${sc.fascia.colore}">${sc.lettera}</div>
        <div class="score-header-info">
          <div class="score-header-title">Score Fattibilità: ${sc.finale}/100</div>
          <div class="score-header-desc">${sc.fascia.label}</div>
        </div>
        <button class="pesi-btn pesi-btn-secondary" style="font-size:11px; padding:6px 12px;"
                onclick="mostraPesiModal()">Configura pesi</button>
      </div>
      <div class="score-body">
        <div class="score-dimension">
          <div class="score-dim-header">
            <div class="score-dim-title">Criticità operative (${conf.peso_criticita}%)</div>
            <div class="score-dim-value" style="color:${dotColor(sc.criticita.score)}">${sc.criticita.score}/100</div>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${sc.criticita.score}%; background:${dotColor(sc.criticita.score)}"></div>
          </div>
          ${renderFattori(sc.criticita.fattori, fasciaDesc)}
        </div>
        <div class="score-dimension">
          <div class="score-dim-header">
            <div class="score-dim-title">Copertura prodotti (${conf.peso_copertura}%)</div>
            <div class="score-dim-value" style="color:${dotColor(sc.copertura.score)}">${sc.copertura.score}/100</div>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${sc.copertura.score}%; background:${dotColor(sc.copertura.score)}"></div>
          </div>
          ${renderFattori(sc.copertura.fattori, copDesc)}
          ${noteHtml}
        </div>
      </div>
    </div>`;
}

function renderScoreBadge(dati, small) {
  const sc = calcolaScore(dati);
  const cls = small ? "score-badge score-badge-sm" : "score-badge";
  return `<div class="${cls}" style="background:${sc.fascia.colore}" title="Score: ${sc.finale}/100 — ${sc.fascia.label}">${sc.lettera}</div>`;
}

      <h3>Configurazione Pesi Score</h3>

        <input type="range" min="0" max="100" value="${conf.peso_criticita}"
               oninput="this.nextElementSibling.textContent=this.value" data-key="peso_criticita">
        <div class="pesi-val">${conf.peso_criticita}</div>
      </div>
      <div class="pesi-row">
        <label><strong>Peso Copertura Prodotti</strong></label>
        <input type="range" min="0" max="100" value="${conf.peso_copertura}"

function chiudiPesiModal() {
  const m = document.getElementById("pesi-modal");
  if (m) m.remove();
}

function salvaPesi() {
  const conf = getConf();
  const modal = document.getElementById("pesi-modal");
  modal.querySelectorAll("input[type=range]").forEach(inp => {
    const section = inp.dataset.section;
    const key = inp.dataset.key;
    const val = parseInt(inp.value);
    if (section && key) {
      conf[section][key].peso = val;
    } else if (key === "peso_criticita") {
      conf.peso_criticita = val;
    } else if (key === "peso_copertura") {
      conf.peso_copertura = val;
    }
  });
  scoreConfig = conf;
  chiudiPesiModal();
  // Ricalcola vista corrente
  if (archivioSelezionato !== null) {
    mostraDettaglioArchivio(archivioSelezionato);
  } else {
    mostraArchivioOverview();
  }
}

function switchTab(tab) {
  tabCorrente = tab;
  document.getElementById("tab-sessione").classList.toggle("active", tab === "sessione");
  document.getElementById("tab-archivio").classList.toggle("active", tab === "archivio");
  document.getElementById("sidebar-sessione").classList.toggle("hidden", tab !== "sessione");
  document.getElementById("sidebar-archivio").classList.toggle("hidden", tab !== "archivio");

  if (tab === "archivio") {
    if (!archivioData) {
      caricaArchivio();
    } else {
      mostraArchivioOverview();
    }
  }
}

function estraiChiaveEnte(gara) {
  // Estrai codice meccanografico (es. RMTF090003) dal nome_ente o dall'id
  const testo = (gara.nome_ente || "") + " " + (gara.id || "");
  const match = testo.match(/\b([A-Za-z]{4}\d{5}[A-Za-z0-9])\b/);
  if (match) return match[1].toUpperCase();
  // Fallback: slug dell'ente dall'ID (parte dopo la data e "Disciplinare-Gara_")
  const slug = (gara.id || "").replace(/^\d{8}_Disciplinare-Gara_/, "").toUpperCase();
  return slug || gara.id;
}

function deduplicaGare(gare) {
  const mappa = new Map();
  for (const g of gare) {
    const chiave = estraiChiaveEnte(g);
    const esistente = mappa.get(chiave);
    if (!esistente || (g.data_elaborazione > esistente.data_elaborazione)) {
      mappa.set(chiave, g);
    }
  }
  return [...mappa.values()].sort((a, b) => b.data_elaborazione.localeCompare(a.data_elaborazione));
}

async function caricaArchivio() {
  const list = document.getElementById("archive-list");
  list.innerHTML = '<div class="sidebar-loading">Caricamento archivio...</div>';

  try {
    // Carica config score in parallelo con l'indice
    const [resp] = await Promise.all([
      fetch("data/index.json"),
      caricaScoreConfig(),
    ]);
    if (!resp.ok) throw new Error("Archivio non ancora disponibile");
    archivioData = await resp.json();

    // Deduplica gare: tiene solo la versione più recente per lo stesso ente
    archivioData.gare = deduplicaGare(archivioData.gare);

    // Carica tutti i JSON in parallelo per ricerca full-text
    await Promise.all(archivioData.gare.map(async g => {
      try {
        const r = await fetch("data/gare/" + g.file);
        if (r.ok) archivioCache[g.id] = await r.json();
      } catch (_) {}
    }));

    archivioFiltrate = [...archivioData.gare];
    mostraArchivioLista();
    mostraArchivioOverview();
  } catch (e) {
    list.innerHTML = `<div class="sidebar-empty">${escHtml(e.message)}</div>`;
  }
}

function estraiImporto(text) {
  if (!text || text === NOT_FOUND) return null;
  const matches = text.match(/[\d.]+,\d{2}/g);
  if (!matches) return null;
  const values = matches.map(m => parseFloat(m.replace(/\./g, "").replace(",", ".")));
  return Math.max(...values);
}

function estraiLocalita(dati) {
  // Cerca in meccanografico + stazione appaltante
  const campi = [dati.nome_scuola_meccanografico || "", dati.stazione_appaltante || ""].join(" ");

  // 1. Codice meccanografico (case-insensitive, ultimo char alfanumerico)
  const mec = campi.match(/\b([A-Za-z]{2})[A-Za-z]{2}\d{5}[A-Za-z0-9]\b/);
  if (mec) {
    const sigla = mec[1].toUpperCase();
    const info = PROVINCE_REGIONE[sigla];
    if (info) return { provincia: info[0], regione: info[1], sigla };
  }

  // 2. Fallback: cerca sigla provincia tra parentesi es. "(PA)", "(RM)", "(GE)"
  const paren = campi.match(/\(([A-Z]{2})\)/);
  if (paren) {
    const info = PROVINCE_REGIONE[paren[1]];
    if (info) return { provincia: info[0], regione: info[1], sigla: paren[1] };
  }

  // 3. Fallback: cerca "PROV. XX" o "Provincia di Xxx" nel testo
  const provAbbr = campi.match(/PROV\.?\s*([A-Z]{2})\b/);
  if (provAbbr) {
    const info = PROVINCE_REGIONE[provAbbr[1]];
    if (info) return { provincia: info[0], regione: info[1], sigla: provAbbr[1] };
  }
  const provNome = campi.match(/[Pp]rovincia\s+di\s+([A-Za-z\s]+?)[\s,\-\.]/);
  if (provNome) {
    const nome = provNome[1].trim();
    for (const [sig, [prov, reg]] of Object.entries(PROVINCE_REGIONE)) {
      if (prov.toLowerCase() === nome.toLowerCase()) return { provincia: prov, regione: reg, sigla: sig };
    }
  }

  return null;
}

function classificaAree(dati) {
  const campo = dati.aree_tematiche;
  if (!campo || campo === NOT_FOUND) return [];
  return campo.split(",").map(a => a.trim()).filter(a => a.length > 0);
}

function estraiNumeroLotti(dati) {
  const v = dati.numero_lotti || "";
  if (!v || v === NOT_FOUND) return null;
  const m = v.match(/\d+/);
  return m ? parseInt(m[0]) : null;
}

// ── RICERCA E FILTRI ─────────────────────────────
function filtraArchivio() {
  if (!archivioData) return;

  const searchText  = (document.getElementById("archive-search")?.value || "").toLowerCase().trim();
  const filtroCrit  = document.getElementById("filtro-criterio")?.value || "";
  const filtroArea  = document.getElementById("filtro-area")?.value || "";
  const filtroFascia = document.getElementById("filtro-fascia")?.value || "";
  const filtroLotti = document.getElementById("filtro-lotti")?.value || "";
  const filtroReg   = document.getElementById("filtro-regione")?.value || "";
  const filtroProv  = document.getElementById("filtro-provincia")?.value || "";
  const filtroDa    = document.getElementById("filtro-data-da")?.value || "";
  const filtroA     = document.getElementById("filtro-data-a")?.value || "";

  archivioFiltrate = archivioData.gare.filter(g => {
    const dati = archivioCache[g.id];
    if (!dati) return !searchText; // senza cache, mostra solo se nessuna ricerca

    // Full-text search
    if (searchText) {
      const allText = Object.values(dati).join(" ").toLowerCase();
      if (!allText.includes(searchText)) return false;
    }

    // Criterio aggiudicazione
    if (filtroCrit) {
      const criterio = (dati.criterio_aggiudicazione || "").toLowerCase();
      if (filtroCrit === "OEPV" && !criterio.includes("oepv") && !criterio.includes("offerta economicamente")) return false;
      if (filtroCrit === "Minor prezzo" && !criterio.includes("minor prezzo") && !criterio.includes("prezzo pi")) return false;
      if (filtroCrit !== "OEPV" && filtroCrit !== "Minor prezzo" && !criterio.includes(filtroCrit.toLowerCase())) return false;
    }

    // Area tematica
    if (filtroArea) {
      const aree = classificaAree(dati);
      if (!aree.includes(filtroArea)) return false;
    }

    // Fascia importo
    if (filtroFascia) {
      const importo = estraiImporto(dati.valore_appalto);
      if (importo === null) return false;
      const fascia = FASCE_IMPORTO[parseInt(filtroFascia)];
      if (!fascia || importo < fascia[1] || importo >= fascia[2]) return false;
    }

    // Numero lotti
    if (filtroLotti) {
      const nLotti = estraiNumeroLotti(dati);
      if (nLotti === null) return false;
      if (filtroLotti === "1" && nLotti !== 1) return false;
      if (filtroLotti === "2-3" && (nLotti < 2 || nLotti > 3)) return false;
      if (filtroLotti === "4-5" && (nLotti < 4 || nLotti > 5)) return false;
      if (filtroLotti === "6+" && nLotti < 6) return false;
    }

    // Regione
    if (filtroReg) {
      const loc = estraiLocalita(dati);
      if (!loc || loc.regione !== filtroReg) return false;
    }

    // Provincia
    if (filtroProv) {
      const loc = estraiLocalita(dati);
      if (!loc || loc.provincia !== filtroProv) return false;
    }

    // Date elaborazione
    if (filtroDa && g.data_elaborazione < filtroDa) return false;
    if (filtroA && g.data_elaborazione > filtroA) return false;

    return true;
  });

  archivioSelezionato = null;
  mostraArchivioLista();
  if (vistaArchivio === "statistiche") mostraStatistiche();
  else mostraArchivioOverview();
}

function resetFiltri() {
  ["archive-search","filtro-criterio","filtro-area","filtro-fascia","filtro-lotti",
   "filtro-regione","filtro-provincia","filtro-data-da","filtro-data-a"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
  filtraArchivio();
}

// ── SIDEBAR: LISTA ARCHIVIO FILTRATA ─────────────
function mostraArchivioLista() {
  const list = document.getElementById("archive-list");
  if (!archivioFiltrate || archivioFiltrate.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">Nessuna gara trovata.</div>';
    return;
  }

  list.innerHTML = archivioFiltrate.map(g => {
    const origIdx = archivioData.gare.indexOf(g);
    const dati = archivioCache[g.id] || {};
    const nome = g.nome_ente.split("\u2014")[0].split(",")[0].trim();
    const nomeCorto = nome.length > 35 ? nome.slice(0, 35) + "..." : nome;
    const importo = estraiImporto(dati.valore_appalto);
    const importoFmt = importo ? "\u20ac " + importo.toLocaleString("it-IT", {minimumFractionDigits: 0, maximumFractionDigits: 0}) : null;

    return `
    <div class="archive-item ${archivioSelezionato === origIdx ? 'active' : ''}"
         onclick="mostraDettaglioArchivio(${origIdx})">
      <div class="archive-item-name">${escHtml(nomeCorto)}</div>
      <div class="archive-item-meta">${g.campi_compilati}/23 campi \u00b7 ${g.data_elaborazione}</div>
      ${importoFmt ? `<div class="archive-item-importo">${importoFmt}</div>` : ""}
    </div>`;
  }).join("");
}

function generaFiltriHtml() {
  const criteriSet = new Set();
  const regioniSet = new Set();
  const provinceSet = new Set();

  for (const g of archivioData.gare) {
    const dati = archivioCache[g.id];
    if (!dati) continue;
    const c = (dati.criterio_aggiudicazione || "").toLowerCase();
    if (c && c !== NOT_FOUND.toLowerCase()) {
      if (c.includes("oepv") || c.includes("offerta economicamente")) criteriSet.add("OEPV");
      else if (c.includes("minor prezzo") || c.includes("prezzo pi")) criteriSet.add("Minor prezzo");
      else criteriSet.add(dati.criterio_aggiudicazione.slice(0, 40));
    }
    const loc = estraiLocalita(dati);
    if (loc) { regioniSet.add(loc.regione); provinceSet.add(loc.provincia); }
  }

  const filtroCrit   = document.getElementById("filtro-criterio")?.value || "";
  const filtroArea   = document.getElementById("filtro-area")?.value || "";
  const filtroFascia = document.getElementById("filtro-fascia")?.value || "";
  const filtroLotti  = document.getElementById("filtro-lotti")?.value || "";
  const filtroReg    = document.getElementById("filtro-regione")?.value || "";
  const filtroProv   = document.getElementById("filtro-provincia")?.value || "";
  const filtroDa     = document.getElementById("filtro-data-da")?.value || "";
  const filtroA      = document.getElementById("filtro-data-a")?.value || "";

  const mkOpts = (set, sel) => Array.from(set).sort().map(v =>
    `<option value="${escHtml(v)}" ${sel === v ? "selected" : ""}>${escHtml(v)}</option>`
  ).join("");

  let provFiltrate = provinceSet;
  if (filtroReg) {
    provFiltrate = new Set();
    for (const [sig, [prov, reg]] of Object.entries(PROVINCE_REGIONE)) {
      if (reg === filtroReg && provinceSet.has(prov)) provFiltrate.add(prov);
    }
  }

  return `<div class="filter-panel">
    <div class="filter-row">
      <div class="filter-group">
        <div class="filter-label">Area Tematica</div>

          <option value="Arredi" ${filtroArea==="Arredi"?"selected":""}>Arredi</option>
          <option value="Software" ${filtroArea==="Software"?"selected":""}>Software</option>
          <option value="Formazione" ${filtroArea==="Formazione"?"selected":""}>Formazione</option>
          <option value="Materiale Didattico" ${filtroArea==="Materiale Didattico"?"selected":""}>Materiale Didattico</option>
          <option value="Consumabili" ${filtroArea==="Consumabili"?"selected":""}>Consumabili</option>
          <option value="STEAM" ${filtroArea==="STEAM"?"selected":""}>STEAM</option>
          <option value="Altro" ${filtroArea==="Altro"?"selected":""}>Altro</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label">Criterio Aggiudicazione</div>
        <select class="filter-select" id="filtro-criterio" onchange="filtraArchivio()">
          <option value="">Tutti</option>
          ${mkOpts(criteriSet, filtroCrit)}
        </select>

        <div class="filter-label">Fascia Importo</div>
        <select class="filter-select" id="filtro-fascia" onchange="filtraArchivio()">
          <option value="">Tutte</option>
          ${FASCE_IMPORTO.map((f, i) => `<option value="${i}" ${filtroFascia===String(i)?"selected":""}>${f[0]}</option>`).join("")}
        </select>
      </div>

          <option value="">Tutti</option>

function mostraArchivioOverview() {
  vistaArchivio = "overview";
  const main = document.getElementById("main-area");

  // Card per ogni gara filtrata
  const cardsHtml = archivioFiltrate.map(g => {
    const origIdx = archivioData.gare.indexOf(g);
    const dati = archivioCache[g.id] || {};
    const nome = (dati.nome_scuola_meccanografico || g.nome_ente).split("\u2014")[0].split(",")[0].trim();
    const valore = dati.valore_appalto || "";
    const importo = estraiImporto(valore);
    const importoFmt = importo ? "\u20ac " + importo.toLocaleString("it-IT", {minimumFractionDigits: 0, maximumFractionDigits: 0}) : null;
    const criterio = dati.criterio_aggiudicazione || "";
    const scadenza = dati.scadenza_procedura || "";
    const lotti = dati.numero_lotti || "";
    const aree = classificaAree(dati);
    const loc = estraiLocalita(dati);

    const areeTags = aree.map(a => `<span class="gara-card-area">${a}</span>`).join("");
    const locTag = loc ? `<span class="gara-card-localita">${loc.provincia} (${loc.sigla})</span>` : "";
    const valoreTag = importoFmt ? `<span class="gara-card-valore">${importoFmt}</span>` : "";
    const isChecked = confrontoSelezione.includes(origIdx);

    const scoreBadge = Object.keys(dati).length > 5 ? renderScoreBadge(dati, true) : "";

    return `
    <div class="gara-card" onclick="mostraDettaglioArchivio(${origIdx})">
      <div class="gara-card-check ${isChecked ? 'checked' : ''}" onclick="event.stopPropagation(); toggleConfronto(${origIdx})" title="Seleziona per confronto">${isChecked ? '\u2713' : ''}</div>
      <div style="display:flex; align-items:center; gap:10px;">
        ${scoreBadge}
        <div class="gara-card-name" style="flex:1">${escHtml(nome)}</div>
      </div>
      ${criterio && criterio !== NOT_FOUND ? `<div class="gara-card-field"><strong>Criterio:</strong> ${escHtml(criterio.slice(0, 60))}</div>` : ""}
      ${scadenza && scadenza !== NOT_FOUND ? `<div class="gara-card-field"><strong>Scadenza:</strong> ${escHtml(scadenza.slice(0, 40))}</div>` : ""}
      ${lotti && lotti !== NOT_FOUND ? `<div class="gara-card-field"><strong>Lotti:</strong> ${escHtml(lotti.slice(0, 30))}</div>` : ""}
      <div class="gara-card-tags">
        ${valoreTag}
        <span class="gara-card-badge">${g.campi_compilati}/23 \u00b7 ${g.data_elaborazione}</span>
        ${locTag}
        ${areeTags}
      </div>
    </div>`;
  }).join("");

  main.innerHTML = `
    <div class="page-heading">Archivio Gare</div>
    <div class="page-sub">Tutte le gare analizzate dalla pipeline automatica.</div>

    ${generaFiltriHtml()}

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <div class="filter-count" style="margin-bottom:0;">${archivioFiltrate.length} di ${archivioData.gare.length} gare</div>
      <div style="display:flex; gap:8px;">
        <button class="btn-export" onclick="mostraStatistiche()">Statistiche</button>
        <button class="btn-export" onclick="esportaExcel()">Esporta Excel</button>
      </div>
    </div>

    ${archivioFiltrate.length > 0
      ? `<div class="archive-grid">${cardsHtml}</div>`
      : `<div class="archive-empty">Nessuna gara corrisponde ai filtri applicati.</div>`
    }
    ${confrontoSelezione.length >= 2
      ? `<button class="btn-confronta" onclick="mostraConfronto()">Confronta ${confrontoSelezione.length} gare</button>`
      : confrontoSelezione.length === 1
        ? `<button class="btn-confronta" style="opacity:.5; cursor:default;">Seleziona almeno 2 gare</button>`
        : ""
    }`;
}

// ── SELEZIONE E CONFRONTO GARE ───────────────────
function toggleConfronto(origIdx) {
  const pos = confrontoSelezione.indexOf(origIdx);
  if (pos >= 0) {
    confrontoSelezione.splice(pos, 1);
  } else if (confrontoSelezione.length < 3) {
    confrontoSelezione.push(origIdx);
  }
  mostraArchivioOverview();
}

function mostraConfronto() {
  if (confrontoSelezione.length < 2) return;
  const main = document.getElementById("main-area");

  const gare = confrontoSelezione.map(idx => ({
    gara: archivioData.gare[idx],
    dati: archivioCache[archivioData.gare[idx].id] || {},
  }));

  // Header con nomi enti
  const nomi = gare.map(g => {
    const nome = (g.dati.nome_scuola_meccanografico || g.gara.nome_ente).split("\u2014")[0].split(",")[0].trim();
    return nome.length > 30 ? nome.slice(0, 30) + "..." : nome;
  });

  // Tag riassuntivi per ogni gara nell'header
  const headerTags = gare.map(g => {
    const importo = estraiImporto(g.dati.valore_appalto);
    const importoFmt = importo ? "\u20ac " + importo.toLocaleString("it-IT", {minimumFractionDigits: 0, maximumFractionDigits: 0}) : "";
    const loc = estraiLocalita(g.dati);
    const locStr = loc ? loc.provincia : "";
    const aree = classificaAree(g.dati);
    return { importoFmt, locStr, aree };
  });

  // Costruisci righe della tabella
  let rowsHtml = "";
  for (const sez of SEZIONI_PIPELINE) {
    // Riga intestazione sezione
    rowsHtml += `<tr class="confronto-section"><td colspan="${gare.length + 1}">${sez.titolo}</td></tr>`;

    for (const [key, label] of sez.campi) {
      rowsHtml += `<tr><td>${label}</td>`;
      for (const g of gare) {
        const val = g.dati[key] || NOT_FOUND;
        const missing = val === NOT_FOUND;
        rowsHtml += `<td class="${missing ? 'missing-cell' : ''}">${missing ? "\u2014" : escHtml(val)}</td>`;
      }
      rowsHtml += `</tr>`;
    }
  }

  const colWidth = Math.floor(70 / gare.length);

  main.innerHTML = `
    <div class="results-header">
      <div>
        <div class="page-heading">Confronto Gare</div>
        <div class="results-meta">${gare.length} gare selezionate</div>
      </div>
      <button class="btn-download" onclick="confrontoSelezione=[]; mostraArchivioOverview();">Torna all'archivio</button>
    </div>

    <table class="confronto-table">
      <thead>
        <tr>
          <th style="width:30%;">Campo</th>
          ${nomi.map((n, i) => `<th style="width:${colWidth}%;">
            ${escHtml(n)}
            <div style="font-weight:400; font-size:10px; margin-top:4px; opacity:.8;">
              ${headerTags[i].importoFmt ? headerTags[i].importoFmt + ' \u00b7 ' : ''}${headerTags[i].locStr}
              ${headerTags[i].aree.map(a => '<br>' + a).join('')}
            </div>
          </th>`).join("")}
        </tr>
      </thead>
      <tbody>
        ${rowsHtml}
      </tbody>
    </table>`;
}

// ── DETTAGLIO SINGOLA GARA ───────────────────────
async function mostraDettaglioArchivio(idx) {
  archivioSelezionato = idx;
  mostraArchivioLista();

  const gara = archivioData.gare[idx];
  const main = document.getElementById("main-area");

  let dati = archivioCache[gara.id];
  if (!dati) {
    main.innerHTML = `
      <div class="processing-card">
        <div class="spinner"></div>
        <div class="processing-title">Caricamento dati...</div>
      </div>`;
    try {
      const resp = await fetch("data/gare/" + gara.file);
      if (!resp.ok) throw new Error("Impossibile caricare i dati della gara");
      dati = await resp.json();
      archivioCache[gara.id] = dati;
    } catch (e) {
      main.innerHTML = `<div class="upload-wrapper"><div class="alert-error">Errore: ${escHtml(e.message)}</div></div>`;
      return;
    }
  }

  const compilati = Object.values(dati).filter(v => v !== NOT_FOUND).length;
  const aree = classificaAree(dati);
  const loc = estraiLocalita(dati);
  const importo = estraiImporto(dati.valore_appalto);
  const importoFmt = importo ? "\u20ac " + importo.toLocaleString("it-IT", {minimumFractionDigits: 0, maximumFractionDigits: 0}) : null;

  const sezioniHtml = SEZIONI_PIPELINE.map(sez => `
    <div class="section-card">
      <div class="section-header">${sez.titolo}</div>
      <div class="section-fields">
        ${sez.campi.map(([key, label]) => {
          const val = dati[key] || NOT_FOUND;
          const missing = val === NOT_FOUND;
          return `<div class="field-row">
            <div class="field-label">${label}</div>
            <div class="field-value ${missing ? 'missing' : ''}">${missing ? '\u2014' : escHtml(val)}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`).join("");

  const nomeEnte = (dati.nome_scuola_meccanografico || gara.nome_ente).split("\u2014")[0].trim();
  const areeTags = aree.map(a => `<span class="gara-card-area">${a}</span>`).join(" ");
  const locTag = loc ? `<span class="gara-card-localita">${loc.provincia} \u2014 ${loc.regione}</span>` : "";

  const scoreHtml = renderScoreSection(dati);

  main.innerHTML = `
    <div class="results-header">
      <div>
        <div class="page-heading">${escHtml(nomeEnte)}</div>
        <div class="results-meta">
          ${importoFmt ? `<span class="gara-card-valore" style="font-size:13px; padding:3px 10px;">${importoFmt}</span> &nbsp;` : ""}
          <span>${compilati}/32 campi compilati</span> &nbsp;\u00b7&nbsp;
          ${gara.data_elaborazione} &nbsp;\u00b7&nbsp;
          ${areeTags} ${locTag}
        </div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-approfondimento" onclick="avviaApprofondimento(${idx})">Analisi Prodotti Dettagliata</button>
        <button class="btn-download" onclick="mostraArchivioOverview()">Torna all'archivio</button>
      </div>
    </div>
    ${scoreHtml}
    <div id="approfondimento-result" style="display:none;"></div>
    ${sezioniHtml}`;
}
