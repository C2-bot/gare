function mostraStatistiche() {
  vistaArchivio = "statistiche";
  const main = document.getElementById("main-area");
  const gare = archivioFiltrate || [];

  // ── KPI ──
  const totale = gare.length;
  const importi = gare.map(g => estraiImporto((archivioCache[g.id] || {}).valore_appalto)).filter(v => v !== null);
  const sommaImporti = importi.reduce((a, b) => a + b, 0);
  const mediaImporto = importi.length > 0 ? sommaImporti / importi.length : 0;
  const regioniUniche = new Set(gare.map(g => { const l = estraiLocalita(archivioCache[g.id] || {}); return l ? l.regione : null; }).filter(Boolean));

  const fmtEuro = v => "\u20ac " + Math.round(v).toLocaleString("it-IT");

  // ── Dati per grafici ──
  // 1. Gare per mese
  const perMese = {};
  gare.forEach(g => {
    const m = g.data_elaborazione.slice(0, 7); // YYYY-MM
    perMese[m] = (perMese[m] || 0) + 1;
  });
  const mesiOrd = Object.keys(perMese).sort();
  const mesiLabels = mesiOrd.map(m => {
    const [y, mo] = m.split("-");
    return ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"][parseInt(mo)-1] + " " + y;
  });

  // 2. Per criterio aggiudicazione
  const perCriterio = {};
  gare.forEach(g => {
    const dati = archivioCache[g.id] || {};
    const c = (dati.criterio_aggiudicazione || "").toLowerCase();
    let label = "Non specificato";
    if (c.includes("oepv") || c.includes("offerta economicamente")) label = "OEPV";
    else if (c.includes("minor prezzo") || c.includes("prezzo pi")) label = "Minor prezzo";
    else if (c && c !== NOT_FOUND.toLowerCase()) label = "Altro";
    perCriterio[label] = (perCriterio[label] || 0) + 1;
  });

  // 3. Per area tematica
  const perArea = {};
  gare.forEach(g => {
    const dati = archivioCache[g.id] || {};
    const aree = classificaAree(dati);
    if (aree.length === 0) { perArea["N/D"] = (perArea["N/D"] || 0) + 1; return; }
    aree.forEach(a => { perArea[a] = (perArea[a] || 0) + 1; });
  });

  // 4. Per fascia importo
  const perFascia = {};
  FASCE_IMPORTO.forEach(f => perFascia[f[0]] = 0);
  gare.forEach(g => {
    const imp = estraiImporto((archivioCache[g.id] || {}).valore_appalto);
    if (imp === null) return;
    for (const [label, min, max] of FASCE_IMPORTO) {
      if (imp >= min && imp < max) { perFascia[label]++; break; }
    }
  });

  // 5. Per regione
  const perRegione = {};
  gare.forEach(g => {
    const loc = estraiLocalita(archivioCache[g.id] || {});
    const reg = loc ? loc.regione : "N/D";
    perRegione[reg] = (perRegione[reg] || 0) + 1;
  });
  const regioniOrd = Object.entries(perRegione).sort((a, b) => b[1] - a[1]);

  main.innerHTML = `
    <div class="results-header">
      <div>
        <div class="page-heading">Statistiche</div>
        <div class="results-meta">Basate su ${totale} gare ${totale < archivioData.gare.length ? "(filtrate)" : ""}</div>
      </div>
      <button class="btn-download" onclick="mostraArchivioOverview()">Torna all'archivio</button>
    </div>

    ${generaFiltriHtml()}

    <div class="stats-summary">
      <div class="stats-kpi">
        <div class="stats-kpi-value">${totale}</div>
        <div class="stats-kpi-label">Gare analizzate</div>
      </div>
      <div class="stats-kpi">
        <div class="stats-kpi-value">${fmtEuro(sommaImporti)}</div>
        <div class="stats-kpi-label">Valore totale</div>
      </div>
      <div class="stats-kpi">
        <div class="stats-kpi-value">${importi.length > 0 ? fmtEuro(mediaImporto) : "N/D"}</div>
        <div class="stats-kpi-label">Importo medio</div>
      </div>
      <div class="stats-kpi">
        <div class="stats-kpi-value">${regioniUniche.size}</div>
        <div class="stats-kpi-label">Regioni</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">Gare per mese</div>
        <canvas id="chart-mese"></canvas>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Criterio di aggiudicazione</div>
        <canvas id="chart-criterio"></canvas>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Aree tematiche</div>
        <canvas id="chart-area"></canvas>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Fascia importo</div>
        <canvas id="chart-importo"></canvas>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Distribuzione per regione</div>
        <canvas id="chart-regione"></canvas>
      </div>
      <div class="stats-card stats-card-full">
        <div class="stats-card-title">Mappa degli enti</div>
        <div id="stats-map" class="map-container"></div>
      </div>
    </div>`;

  // ── Render grafici ──
  new Chart(document.getElementById("chart-mese"), {
    type: "bar",
    data: { labels: mesiLabels, datasets: [{ label: "Gare", data: mesiOrd.map(m => perMese[m]), backgroundColor: "#0074C5", borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  new Chart(document.getElementById("chart-criterio"), {
    type: "doughnut",
    data: { labels: Object.keys(perCriterio), datasets: [{ data: Object.values(perCriterio), backgroundColor: CHART_COLORS }] },
    options: { plugins: { legend: { position: "bottom" } } }
  });

  const areeLabels = Object.keys(perArea).sort((a, b) => perArea[b] - perArea[a]);
  new Chart(document.getElementById("chart-area"), {
    type: "bar",
    data: { labels: areeLabels, datasets: [{ label: "Gare", data: areeLabels.map(a => perArea[a]), backgroundColor: "#F55D3E", borderRadius: 6 }] },
    options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  new Chart(document.getElementById("chart-importo"), {
    type: "bar",
    data: { labels: FASCE_IMPORTO.map(f => f[0]), datasets: [{ label: "Gare", data: FASCE_IMPORTO.map(f => perFascia[f[0]]), backgroundColor: "#31C192", borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  new Chart(document.getElementById("chart-regione"), {
    type: "bar",
    data: { labels: regioniOrd.map(r => r[0]), datasets: [{ label: "Gare", data: regioniOrd.map(r => r[1]), backgroundColor: "#7B1FA2", borderRadius: 6 }] },
    options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  // ── Mappa Leaflet ──
  const mapEl = document.getElementById("stats-map");
  if (mapEl) {
    const map = L.map("stats-map").setView([42.0, 12.5], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 18,
    }).addTo(map);

    // Raggruppa gare per provincia
    const gareProv = {};
    gare.forEach(g => {
      const dati = archivioCache[g.id] || {};
      const loc = estraiLocalita(dati);
      if (!loc) return;
      if (!gareProv[loc.sigla]) gareProv[loc.sigla] = { loc, gare: [] };
      gareProv[loc.sigla].gare.push({ g, dati });
    });

    const bounds = [];
    for (const [sigla, info] of Object.entries(gareProv)) {
      const coords = PROVINCE_COORDS[sigla];
      if (!coords) continue;

      const n = info.gare.length;
      const radius = Math.max(8, Math.min(20, 8 + n * 4));

      // Popup con elenco gare
      const popupHtml = info.gare.map(({ g, dati }) => {
        const nome = (dati.nome_scuola_meccanografico || g.nome_ente).split("\u2014")[0].split(",")[0].trim();
        const imp = estraiImporto(dati.valore_appalto);
        const impFmt = imp ? " \u2014 \u20ac " + Math.round(imp).toLocaleString("it-IT") : "";
        return `<strong>${escHtml(nome.slice(0, 40))}</strong>${impFmt}`;
      }).join("<br>");

      const marker = L.circleMarker([coords[0], coords[1]], {
        radius,
        fillColor: "#0074C5",
        color: "#003E87",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.7,
      }).addTo(map);

      marker.bindPopup(`<div style="font-size:12px; max-width:280px;">
        <strong style="color:#003E87;">${info.loc.provincia} (${sigla})</strong>
        <span style="color:#5F6368;"> \u2014 ${n} gara${n > 1 ? "e" : ""}</span>
        <hr style="margin:6px 0; border:none; border-top:1px solid #ddd;">
        ${popupHtml}
      </div>`);

      bounds.push([coords[0], coords[1]]);
    }

    if (bounds.length > 0) {
      if (bounds.length === 1) map.setView(bounds[0], 10);
      else map.fitBounds(bounds, { padding: [30, 30] });
    }
  }
}

// ═══════════════════════════════════════════════════
//  EXPORT EXCEL (SheetJS)
// ═══════════════════════════════════════════════════

// Mesi italiani per parsing date
const MESI_IT = {
  gennaio:1, febbraio:2, marzo:3, aprile:4, maggio:5, giugno:6,
  luglio:7, agosto:8, settembre:9, ottobre:10, novembre:11, dicembre:12
};

function normalizzaData(text) {
  if (!text || text === NOT_FOUND) return "";

  // Formato: dd/mm/yyyy o dd.mm.yyyy o dd-mm-yyyy (con eventuale ore)
  let m = text.match(/(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})/);
  if (m) return `${m[1].padStart(2,"0")}/${m[2].padStart(2,"0")}/${m[3]}`;

  // Formato: "23 marzo 2026" (giorno mese_scritto anno)
  m = text.match(/(\d{1,2})\s+(gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre)\s+(\d{4})/i);
  if (m) return `${m[1].padStart(2,"0")}/${String(MESI_IT[m[2].toLowerCase()]).padStart(2,"0")}/${m[3]}`;

  // Nessuna data riconosciuta — restituisci il testo originale
  return text;
}

// Campi data da normalizzare
const CAMPI_DATA = ["inizio_procedura", "scadenza_procedura", "chiusura_richiesta_chiarimenti", "data_limite_consegna_beni"];

function esportaExcel() {
  if (!archivioFiltrate || archivioFiltrate.length === 0) return;

  // Tutti i campi della pipeline come colonne
  const colonne = SEZIONI_PIPELINE.flatMap(sez => sez.campi);

  // Header
  const header = colonne.map(([key, label]) => label);
  header.unshift("Data Elaborazione");
  header.push("Provincia", "Regione");

  // Righe dati
  const righe = archivioFiltrate.map(g => {
    const dati = archivioCache[g.id] || {};
    const loc = estraiLocalita(dati);
    const riga = colonne.map(([key]) => {
      const val = dati[key];
      if (!val || val === NOT_FOUND) return "";
      // Normalizza campi data
      if (CAMPI_DATA.includes(key)) return normalizzaData(val);
      return val;
    });
    riga.unshift(g.data_elaborazione);
    riga.push(loc ? loc.provincia : "", loc ? loc.regione : "");
    return riga;
  });

  // Crea workbook
  const ws_data = [header, ...righe];
  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  // Larghezze colonne auto
  ws["!cols"] = header.map((h, i) => {
    const maxLen = Math.max(h.length, ...righe.map(r => (r[i] || "").toString().length));
    return { wch: Math.min(Math.max(maxLen, 12), 50) };
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Gare");

  // Download
  const data = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `C2Group_Archivio_Gare_${data}.xlsx`);
}
