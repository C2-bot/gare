<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C2 Group — Analizzatore Disciplinari di Gara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --blue:    #003E87;
    --blue-mid:#0074C5;
    --accent:  #F55D3E;
    --white:   #FFFFFF;
    --off:     #F9FAFB;
    --gray:    #5F6368;
    --border:  #DADCE0;
    --text:    #000000;
    --ok:      #31C192;
    --err:     #C62828;
    --light-blue: #DFF1FF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--blue);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    display: flex;
    align-items: center;
  }
  .header-logo img {
    height: 32px;
    width: auto;
  }
  .header-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 17px;
    color: var(--white);
    letter-spacing: .02em;
  }
  .header-title span {
    color: var(--accent);
    font-weight: 600;
  }
  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,.75);
    font-size: 13px;
  }
  .btn-logout {
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: Arial, sans-serif;
  }
  .btn-logout:hover { background: var(--blue-mid); color: var(--white); }

  /* ── LAYOUT ─────────────────────────────────── */
  .app { flex: 1; display: flex; }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    width: 280px;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gray);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-empty {
    padding: 16px 20px;
    font-size: 13px;
    color: var(--gray);
    font-style: italic;
  }
  .history-list { overflow-y: auto; flex: 1; }
  .history-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .history-item:hover { background: var(--off); }
  .history-item.active { border-left-color: var(--blue-mid); background: var(--light-blue); }
  .history-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }
  .btn-nuova {
    margin: 16px 20px 0;
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-nuova:hover { background: var(--blue-mid); color: var(--white); }

  /* ── MAIN AREA ─────────────────────────────── */
  main { flex: 1; overflow-y: auto; padding: 40px; }

  /* ── SCREEN: LOGIN ─────────────────────────── */
  #screen-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #003E87 0%, #001A3D 100%);
  }
  .login-card {
    background: var(--white);
    border-radius: 16px;
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,.3);
  }
  .login-logo {
    margin-bottom: 20px;
  }
  .login-logo img {
    width: 80px;
    height: auto;
  }
  .login-heading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 32px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--blue-mid); }
  .field-hint {
    font-size: 11px;
    color: var(--gray);
    margin-top: 4px;
  }
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: background .2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #7E0000; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .login-error {
    background: #FFEBEE;
    color: var(--err);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ── SCREEN: UPLOAD ─────────────────────────── */
  .upload-wrapper {
    max-width: 680px;
    margin: 0 auto;
  }
  .page-heading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 36px;
  }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 64px 40px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--white);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--blue-mid);
    background: var(--light-blue);
  }
  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .drop-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .drop-sub { font-size: 13px; color: var(--gray); }
  .drop-sub span { color: var(--blue-mid); text-decoration: underline; cursor: pointer; }
  #file-input { display: none; }
  .file-selected {
    display: none;
    margin-top: 20px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    align-items: center;
    gap: 14px;
  }
  .file-selected.visible { display: flex; }
  .file-icon {
    width: 40px;
    height: 40px;
    background: #FFEBEE;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .file-info { flex: 1; }
  .file-name { font-size: 14px; font-weight: 500; }
  .file-size { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .btn-remove {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }
  .btn-analyze {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all .2s;
    display: none;
  }
  .btn-analyze:hover { background: #7E0000; }
  .btn-analyze.visible { display: block; }

  /* ── SCREEN: PROCESSING ─────────────────────── */
  .processing-card {
    max-width: 520px;
    margin: 60px auto;
    background: var(--white);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid var(--border);
    border-top-color: var(--blue-mid);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .processing-sub { font-size: 14px; color: var(--gray); line-height: 1.6; }
  .progress-steps { margin-top: 28px; text-align: left; }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
    color: var(--gray);
    border-bottom: 1px solid var(--border);
  }
  .step:last-child { border-bottom: none; }
  .step-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .step.done .step-dot { background: var(--ok); border-color: var(--ok); color: white; }
  .step.active .step-dot { border-color: var(--blue-mid); animation: pulse 1s infinite; }
  .step.done, .step.active { color: var(--text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── SCREEN: RESULTS ─────────────────────────── */
  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 20px;
  }
  .results-meta { font-size: 12px; color: var(--gray); margin-top: 4px; }
  .results-meta span { color: var(--ok); font-weight: 600; }
  .btn-download {
    color: var(--blue-mid);
    border: 1px solid var(--border);
    background: var(--white);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-download:hover { background: var(--blue-mid); color: var(--white); }

  .section-card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .section-header {
    font-family: 'Montserrat', sans-serif;
    background: var(--blue-mid);
    color: white;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .section-fields { padding: 0; }
  .field-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    background: var(--light-blue);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 14px;
  }
  .field-value {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    display: flex;
    align-items: center;
  }
  .field-value.missing {
    color: var(--gray);
    font-style: italic;
    font-size: 12px;
  }

  /* ── SIDEBAR TABS ─────────────────────────── */
  .sidebar-tabs {
    display: flex;
    padding: 0 12px 12px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--gray);
    cursor: pointer;
    border-radius: 6px;
    transition: all .15s;
  }
  .sidebar-tab:hover { background: var(--off); }
  .sidebar-tab.active {
    background: var(--light-blue);
    color: var(--blue-mid);
  }
  .archive-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .archive-item:hover { background: var(--off); }
  .archive-item.active { border-left-color: var(--blue-mid); background: var(--light-blue); }
  .archive-item-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .archive-item-meta {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }
  .archive-item-importo {
    font-size: 11px;
    color: var(--blue-mid);
    font-weight: 500;
    margin-top: 1px;
  }
  .sidebar-loading {
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--gray);
  }

  /* ── ARCHIVIO MAIN ──────────────────────────── */
  .archivio-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .archivio-count {
    font-size: 13px;
    color: var(--gray);
  }

  /* ── UTILS ─────────────────────────────────── */
  .hidden { display: none !important; }
  .alert-error {
    background: #FFEBEE;
    color: var(--err);
    border: 1px solid #FFCDD2;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     SCREEN: LOGIN
════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo"><img src="img/C2Group_verticale-azzurro.png" alt="C2 Group"></div>
    <div class="login-heading">Analizzatore Disciplinari</div>
    <div class="login-sub">Accedi con le tue credenziali C2 Group</div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Inserisci la password">
    </div>
    <div class="field">
      <label>API Key Anthropic</label>
      <input type="password" id="login-apikey" placeholder="sk-ant-...">
      <div class="field-hint">Inserisci la chiave una sola volta, viene salvata nel browser.</div>
    </div>
    <button class="btn-primary" id="btn-login">Accedi</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     APP SHELL (dopo login)
════════════════════════════════════════════════ -->
<div id="app-shell" class="hidden">
  <header>
    <div class="header-brand">
      <div class="header-logo"><img src="img/C2Group_ORIZZONTALE-bianco.png" alt="C2 Group"></div>
      <div class="header-title">C2 Group &nbsp;&middot;&nbsp; <span>Analizzatore Disciplinari di Gara</span></div>
    </div>
    <div class="header-user">
      <button class="btn-logout" id="btn-logout">Esci</button>
    </div>
  </header>

  <div class="app">
    <!-- Sidebar storico + archivio -->
    <aside class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tab-sessione" onclick="switchTab('sessione')">Sessione</button>
        <button class="sidebar-tab" id="tab-archivio" onclick="switchTab('archivio')">Archivio</button>
      </div>
      <div id="sidebar-sessione">
        <div class="history-list" id="history-list">
          <div class="sidebar-empty">Nessuna analisi ancora effettuata.</div>
        </div>
      </div>
      <div id="sidebar-archivio" class="hidden">
        <div class="history-list" id="archive-list">
          <div class="sidebar-loading">Caricamento archivio...</div>
        </div>
      </div>
      <button class="btn-nuova" id="btn-nuova">
        <span>+</span> Nuova analisi
      </button>
    </aside>

    <main id="main-area">
      <!-- Contenuto dinamico -->
    </main>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIGURAZIONE
// ═══════════════════════════════════════════════════
const APP_PASSWORD = "AnalisiBandi";
const CLAUDE_MODEL = "claude-sonnet-4-5";
const CHUNK_SIZE = 35000;
const NOT_FOUND = "Non specificato nel documento";

const SYSTEM_PROMPT = `Sei un esperto analista di appalti pubblici italiani.
Analizza il Disciplinare di Gara fornito ed estrai esattamente i seguenti 23 campi in formato JSON.
Per ogni campo non trovato nel documento, usa esattamente la stringa "Non specificato nel documento".
Rispondi SOLO con il JSON, senza testo aggiuntivo, senza markdown, senza backtick.

Campi richiesti:
{
  "nome_scuola_meccanografico": "Nome completo dell'ente + codice meccanografico (es. ITC Marconi — PETD03000D) o codice fiscale per altri enti",
  "stazione_appaltante": "Nome della stazione appaltante se diversa dall'ente",
  "oggetto_gara": "Descrizione sintetica dell'oggetto della gara",
  "cup_codice_progetto": "Codice CUP o codice progetto PNRR/PNC (es. B67H23000420006)",
  "numero_lotti": "Numero di lotti in cui è suddivisa la gara (es. 1, 3, 'Lotto unico')",
  "importo_totale": "Importo totale a base d'asta in euro (es. 150.000,00 €)",
  "importo_per_lotto": "Importo per singolo lotto se suddivisa (es. Lotto 1: 50.000 €, Lotto 2: 100.000 €)",
  "procedura": "Tipo di procedura (es. RDO MePA, Procedura aperta, Affidamento diretto)",
  "criterio_aggiudicazione": "Criterio di aggiudicazione (es. Minor prezzo, OEPV)",
  "inizio_procedura": "Data di pubblicazione o avvio procedura (gg/mm/aaaa)",
  "scadenza_offerta": "Data e ora limite per presentazione offerta (es. 15/03/2026 ore 12:00)",
  "sopralluogo": "Sopralluogo obbligatorio: si/no, e data se disponibile",
  "garanzia_minima_obbligatoria": "Garanzia provvisoria minima obbligatoria richiesta (importo o percentuale)",
  "garanzia_criterio_premiale": "Garanzia come criterio premiale/punteggio aggiuntivo se previsto",
  "fatturato_minimo": "Fatturato minimo richiesto (es. 200.000 € negli ultimi 3 anni)",
  "esperienze_pregresse": "Esperienze o forniture pregresse richieste come requisito",
  "certificazioni": "Certificazioni richieste (es. ISO 9001, CAM, altro)",
  "categorie_prodotti": "Categorie merceologiche o CPV dei prodotti/servizi richiesti",
  "marche_specifiche": "Marche o modelli specifici citati (es. Google Workspace, Lenovo, Apple)",
  "subappalto": "Subappalto ammesso: si/no e condizioni",
  "varianti": "Varianti ammesse: si/no",
  "penali": "Penali previste per inadempimento (importo o percentuale)",
  "note_aggiuntive": "Altre informazioni rilevanti non coperte dai campi precedenti"
}`;

// ═══════════════════════════════════════════════════
//  STATO APPLICAZIONE
// ═══════════════════════════════════════════════════
const state = {
  apiKey: null,
  storico: [],
  corrente: null,
};

// ═══════════════════════════════════════════════════
//  STRUTTURA SEZIONI / CAMPI
// ═══════════════════════════════════════════════════
const SEZIONI = [
  { titolo: "Identificazione Gara", campi: [
    ["nome_scuola_meccanografico", "Ente / Cod. Meccanografico"],
    ["stazione_appaltante",        "Stazione Appaltante"],
    ["oggetto_gara",               "Oggetto della Gara"],
    ["cup_codice_progetto",        "CUP / Codice Progetto"],
    ["numero_lotti",               "Numero Lotti"],
    ["procedura",                  "Tipo di Procedura"],
    ["criterio_aggiudicazione",    "Criterio di Aggiudicazione"],
  ]},
  { titolo: "Importi", campi: [
    ["importo_totale",   "Importo Totale"],
    ["importo_per_lotto","Importo per Lotto"],
  ]},
  { titolo: "Date e Scadenze", campi: [
    ["inizio_procedura", "Avvio Procedura"],
    ["scadenza_offerta", "Scadenza Offerta"],
    ["sopralluogo",      "Sopralluogo"],

// ═══════════════════════════════════════════════════
//  ESTRAZIONE TESTO DA PDF (client-side con pdf.js)
// ═══════════════════════════════════════════════════
async function estraiTestoPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let testo = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(" ");
    testo += pageText + "\n";
  }
  return { text: testo, numPages: pdf.numPages };
}

// ═══════════════════════════════════════════════════
//  CHIAMATA API CLAUDE (diretta dal browser)
// ═══════════════════════════════════════════════════
async function chiamaApi(testo, blocco, totale) {
  const contesto = totale > 1
    ? `[Blocco ${blocco}/${totale} del documento. Estrai solo le info presenti in questo blocco.]\n\n`
    : "";

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": state.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      messages: [{ role: "user", content: "Analizza il seguente Disciplinare di Gara:\n\n" + contesto + testo }],
    }),
  });

  if (!response.ok) {
    const errBody = await response.text();
    throw new Error("Errore API Claude (" + response.status + "): " + errBody);
  }

  const result = await response.json();
  let raw = result.content[0].text.trim();
  raw = raw.replace(/```json/g, "").replace(/```/g, "").trim();
  return JSON.parse(raw);
}

function unisciRisultati(lista) {
  const campi = SEZIONI.flatMap(s => s.campi.map(c => c[0]));
  const risultato = {};
  for (const key of campi) {
    for (const dati of lista) {
      const val = dati[key];
      if (val && val !== NOT_FOUND) { risultato[key] = val; break; }
    }
    if (!risultato[key]) risultato[key] = NOT_FOUND;
  }
  return risultato;
}

// ═══════════════════════════════════════════════════
//  ANALISI
// ═══════════════════════════════════════════════════
async function avviaAnalisi() {
  if (!fileScelto) return;
  const nomeFile = fileScelto.name;

  mostraProcessing(nomeFile);

  try {
    // 1. Estrai testo dal PDF
    const pdfData = await estraiTestoPdf(fileScelto);
    const testo = pdfData.text;

    if (!testo || testo.trim().length < 200) {
      throw new Error("PDF non leggibile o testo troppo breve. Verificare che non sia un documento scansionato.");
    }

    setStep(1);

    // 2. Suddividi in blocchi se necessario
    let blocchi = [];
    if (testo.length <= CHUNK_SIZE) {
      blocchi = [testo];
    } else {
      let inizio = 0;
      while (inizio < testo.length) {
        let fine = inizio + CHUNK_SIZE;
        if (fine < testo.length) {
          const finePara = testo.lastIndexOf("\n", fine);
          if (finePara > inizio + CHUNK_SIZE / 2) fine = finePara;
        }
        blocchi.push(testo.slice(inizio, fine));
        inizio = fine;
      }
    }

    // 3. Analizza ogni blocco
    const risultati = [];
    for (let i = 0; i < blocchi.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 45000));
      const dati = await chiamaApi(blocchi[i], i + 1, blocchi.length);
      risultati.push(dati);
    }

    const datiFinal = blocchi.length > 1 ? unisciRisultati(risultati) : risultati[0];

    setStep(2);
    setStep(3);

    // 4. Salva in storico
    const voce = {
      nomeFile,
      dati: datiFinal,
      pagine: pdfData.numPages,
      blocchi: blocchi.length,
      ts: new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }),
      compilati: Object.values(datiFinal).filter(v => v !== NOT_FOUND).length,
    };
    state.storico.unshift(voce);
    state.corrente = 0;
    aggiornaHistoryUI();

    setTimeout(() => mostraRisultati(0), 600);

  } catch (e) {
    document.getElementById("main-area").innerHTML = `
      <div class="upload-wrapper">
        <div class="alert-error">Errore durante l'analisi: ${escHtml(e.message)}</div>
        <button class="btn-primary" onclick="mostraUpload()" style="max-width:200px; margin-top:16px;">Riprova</button>
      </div>`;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

// ═══════════════════════════════════════════════════
//  SCARICA PDF (jsPDF client-side)
// ═══════════════════════════════════════════════════
function scaricaPdf(idx) {
  const { jsPDF } = window.jspdf;
  const voce  = state.storico[idx];
  const { dati, nomeFile, compilati } = voce;
  const doc   = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
  const W     = 210, ML = 18, MR = 18, TW = W - ML - MR;
  const BLUE  = [26, 60, 110];
  const GOLD  = [232, 160, 32];
  const GRAY  = [138, 148, 166];
  let y = 18;

  // Header
  doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
  doc.rect(0, 0, W, 28, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("C2 Group", ML, 12);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.text("Scheda Analisi Disciplinare di Gara", ML, 19);
  doc.text("Elaborata il " + new Date().toLocaleDateString("it-IT") + " - " + compilati + "/23 campi", ML, 25);
  y = 36;

  // Accent line
  doc.setFillColor(GOLD[0], GOLD[1], GOLD[2]);
  doc.rect(ML, y-4, TW, 1.5, "F");

  SEZIONI.forEach(sez => {
    if (y > 265) { doc.addPage(); y = 20; }
    doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
    doc.rect(ML, y, TW, 7, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text(sez.titolo.toUpperCase(), ML + 3, y + 5);
    y += 9;

    sez.campi.forEach(([key, label]) => {
      const val     = dati[key] || NOT_FOUND;
      const missing = val === NOT_FOUND;
      const lines   = doc.splitTextToSize(missing ? "\u2014" : val, TW - 68);
      const rowH    = Math.max(8, lines.length * 4.5 + 4);

      if (y + rowH > 282) { doc.addPage(); y = 20; }

      doc.setFillColor(247, 250, 253);
      doc.rect(ML, y, 62, rowH, "F");
      doc.setDrawColor(221, 227, 236);
      doc.rect(ML, y, TW, rowH);

      doc.setFont("helvetica", "bold");
      doc.setFontSize(7.5);
      doc.setTextColor(BLUE[0], BLUE[1], BLUE[2]);
      doc.text(label, ML + 2, y + 5);

      doc.setFont("helvetica", missing ? "italic" : "normal");
      doc.setFontSize(8);
      if (missing) {
        doc.setTextColor(GRAY[0], GRAY[1], GRAY[2]);
      } else {
        doc.setTextColor(28, 43, 58);
      }
      doc.text(lines, ML + 64, y + 5);
      y += rowH;
    });
    y += 4;
  });

  // Footer
  doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
  doc.rect(0, 287, W, 10, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(7);
  doc.text("C2 Group - Documento riservato ad uso interno", W / 2, 293, { align: "center" });

  doc.save(nomeFile.replace(".pdf", "_ANALISI.pdf"));
}

      ${sezioniHtml}`;

  } catch (e) {
    main.innerHTML = `
      <div class="upload-wrapper">
        <div class="alert-error">Errore: ${escHtml(e.message)}</div>
      </div>`;
  }
}
</script>
</body>
</html>
